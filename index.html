<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Júlia Ferreira</title>
    <link rel="stylesheet" href="templatemo-prism-flux.css">
</head>

<body>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="loader-content">
        <div class="loader-prism">
            <div class="prism-face"></div>
            <div class="prism-face"></div>
            <div class="prism-face"></div>
        </div>
        <div style="color: var(--accent-purple); font-size: 18px;">
            Carregando Portfolio
        </div>
    </div>
</div>

<!-- Header -->
<header class="header" id="header">
    <nav class="nav-container">

        <a href="#home" class="logo">
            <span class="logo-text">
                <span class="prism">Portfólio - Júlia Ferreira</span>
            </span>
        </a>

        <ul class="nav-menu" id="navMenu">
            <li><a href="#home" class="nav-link active">Início</a></li>
            <li><a href="#about" class="nav-link">Sobre</a></li>
            <li><a href="#skills" class="nav-link">Aplicativos</a></li>
            <li><a href="#contact" class="nav-link">Contato</a></li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
            <span></span><span></span><span></span>
        </div>

    </nav>
</header>

<!-- Hero -->
<section class="hero" id="home">
    <div class="carousel-container">
        <div class="carousel" id="carousel"></div>

        <div class="carousel-controls">
            <button id="prevBtn">‹</button>
            <button id="nextBtn">›</button>
        </div>

        <div class="carousel-indicators" id="indicators"></div>
    </div>
</section>

<!-- About -->
<section class="philosophy-section" id="about">
    <div class="philosophy-container">

        <h2 class="philosophy-headline">Sobre Mim</h2>

        <p class="philosophy-subheading">
            Me chamo Júlia, sou estudante de Cinema e Audiovisual...
        </p>

    </div>
</section>

<!-- Skills -->
<section class="skills-section" id="skills">
    <div class="skills-container">

        <div class="skills-hexagon-grid" id="skillsGrid"></div>

    </div>
</section>

<!-- Contact -->
<section class="contact-section" id="contact">

    <div class="contact-container">

        <div class="contact-info">
            <a class="info-item">
                <div class="info-icon">📍</div>
                <div>
                    <h4>Localização</h4>
                    <p>Belo Horizonte - MG</p>
                </div>
            </a>
        </div>

    </div>

</section>

<script src="templatemo-prism-scripts.js"></script>

</body>
</html>
